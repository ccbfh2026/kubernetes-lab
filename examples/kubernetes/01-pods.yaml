# 1. Create a dedicated namespace for pod examples
apiVersion: v1
kind: Namespace
metadata:
  name: pod-examples
  labels:
    demo: kubernetes
    section: pods

---
# 2. Basic Pod
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  namespace: pod-examples
  labels:
    app: nginx
    demo: kubernetes
spec:
  containers:
  - name: nginx
    image: nginx:stable
    ports:
    - containerPort: 80

---
# 3. Pod with Multiple Containers
apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  namespace: pod-examples
  labels:
    app: web
    demo: kubernetes
spec:
  containers:
  - name: nginx
    image: nginx:stable
    ports:
    - containerPort: 80
  - name: sidecar
    image: busybox:stable
    command: ["sh", "-c", "while true; do echo Sidecar running; sleep 10; done"]

---
# 4. Pod with Resource Requests and Limits
# Note: Keep resource requests small for Kind cluster
apiVersion: v1
kind: Pod
metadata:
  name: resource-pod
  namespace: pod-examples
  labels:
    app: app-with-resources
    demo: kubernetes
spec:
  containers:
  - name: app
    image: nginx:stable
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

---
# 5. Pod with Liveness and Readiness Probes
apiVersion: v1
kind: Pod
metadata:
  name: probes-pod
  namespace: pod-examples
  labels:
    app: app-with-probes
    demo: kubernetes
spec:
  containers:
  - name: app
    image: nginx:stable
    ports:
    - containerPort: 80
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 2
      periodSeconds: 3