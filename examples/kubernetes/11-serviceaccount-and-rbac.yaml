# 1. Create a dedicated namespace for ServiceAccount examples
apiVersion: v1
kind: Namespace
metadata:
  name: rbac-examples
  labels:
    demo: kubernetes
    section: rbac

---
# 2. Basic ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-service-account
  namespace: rbac-examples

---
# 3. Role with specific permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: rbac-examples
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]

---
# 4. RoleBinding to grant role permissions to service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods
  namespace: rbac-examples
subjects:
- kind: ServiceAccount
  name: demo-service-account
  namespace: rbac-examples
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io

---
# 5. Deployment of test pods to inspect
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment
  namespace: rbac-examples
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: nginx
        image: nginx:stable
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
# 6. ConfigMap for test data
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-config
  namespace: rbac-examples
data:
  app.config: |
    environment=development
    debug=true
    log_level=info

---
# 7. Pod that uses the ServiceAccount
apiVersion: v1
kind: Pod
metadata:
  name: rbac-test-pod
  namespace: rbac-examples
spec:
  serviceAccountName: demo-service-account
  containers:
  - name: kubectl
    image: bitnami/kubectl:latest
    command: ["sleep", "3600"]
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

---
# 8. Demo instructions:
#
# Apply the manifest to create the RBAC resources:
# kubectl apply -f 11-serviceaccount-and-rbac.yaml
#
# Check the serviceaccount:
# kubectl get serviceaccount -n rbac-examples
#
# Check the role and rolebinding:
# kubectl get role,rolebinding -n rbac-examples
#
# Exec into the pod that uses the service account:
# kubectl exec -it rbac-test-pod -n rbac-examples -- sh
#
# Inside the pod, test what the service account can access:
# # Should succeed (has permission to list pods)
# kubectl get pods -n rbac-examples
#
# # Should succeed (has permission to get configmaps)
# kubectl get configmap test-config -n rbac-examples
#
# # Should fail (no permission to list deployments)
# kubectl get deployments -n rbac-examples
#
# # Should fail (no permission to list pods in other namespaces)
# kubectl get pods -n default
#
# Note: When testing permissions in the pod, you may need to set:
# export KUBECONFIG=/var/run/secrets/kubernetes.io/serviceaccount