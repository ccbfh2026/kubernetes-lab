# 1. Create a dedicated namespace for ConfigMap and Secret examples
apiVersion: v1
kind: Namespace
metadata:
  name: config-examples
  labels:
    demo: kubernetes
    section: configuration

---
# 2. Basic ConfigMap with key-value pairs
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: config-examples
data:
  # Simple key-value pairs
  database_url: "mysql://db.example.com:3306/mydb"
  api_endpoint: "https://api.example.com/v1"
  log_level: "INFO"
  
  # Multi-line configuration file
  app.properties: |
    server.port=8080
    spring.application.name=MyApp
    logging.level.root=INFO
    feature.toggle.newUI=true

---
# 3. Basic Secret
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: config-examples
type: Opaque
data:
  # Values must be base64 encoded
  # echo -n "admin" | base64
  username: YWRtaW4=
  # echo -n "s3cr3t-p4ssw0rd" | base64
  password: czNjcjN0LXA0c3N3MHJk

---
# 4. Pod using ConfigMap as Environment Variables
apiVersion: v1
kind: Pod
metadata:
  name: configmap-env-pod
  namespace: config-examples
spec:
  containers:
  - name: app
    image: busybox:stable
    command: ["sh", "-c", "echo The log level is: $LOG_LEVEL && echo All env vars: && env | sort && sleep 3600"]
    env:
    # Using individual ConfigMap values as environment variables
    - name: LOG_LEVEL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: log_level
    # Load all key-value pairs from a ConfigMap as environment variables
    envFrom:
    - configMapRef:
        name: app-config

---
# 5. Pod using Secrets as Environment Variables
apiVersion: v1
kind: Pod
metadata:
  name: secret-env-pod
  namespace: config-examples
spec:
  containers:
  - name: app
    image: busybox:stable
    command: ["sh", "-c", "echo Username from secret: $DB_USERNAME && echo 'Password: *****' && sleep 3600"]
    env:
    # Using individual Secret values as environment variables
    - name: DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: password

---
# 6. Pod Mounting ConfigMap as a Volume
apiVersion: v1
kind: Pod
metadata:
  name: configmap-volume-pod
  namespace: config-examples
spec:
  containers:
  - name: app
    image: busybox:stable
    command: ["sh", "-c", "echo ConfigMap mounted as volume: && ls -la /etc/config && cat /etc/config/app.properties && sleep 3600"]
    volumeMounts:
    - name: config-volume
      mountPath: /etc/config
  volumes:
  - name: config-volume
    configMap:
      name: app-config

---
# 7. Pod Mounting Secret as a Volume
apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-pod
  namespace: config-examples
spec:
  containers:
  - name: app
    image: busybox:stable
    command: ["sh", "-c", "echo Secret mounted as volume: && ls -la /etc/secrets && echo Contents of username: && cat /etc/secrets/username && echo && sleep 3600"]
    volumeMounts:
    - name: secret-volume
      mountPath: /etc/secrets
      readOnly: true
  volumes:
  - name: secret-volume
    secret:
      secretName: app-secrets

---
# 8. Demo commands:
# View ConfigMap: kubectl describe configmap app-config -n config-examples
# View Secret (encoded): kubectl describe secret app-secrets -n config-examples
# View Secret (decoded): kubectl get secret app-secrets -n config-examples -o jsonpath='{.data.username}' | base64 --decode
# Check env variables: kubectl logs configmap-env-pod -n config-examples
# Check mounted config: kubectl logs configmap-volume-pod -n config-examples
# Check mounted secret: kubectl logs secret-volume-pod -n config-examples