# 1. Create a dedicated namespace for service examples
apiVersion: v1
kind: Namespace
metadata:
  name: service-examples
  labels:
    demo: kubernetes
    section: services

---
# 2. Deploy backend pods for service demonstration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: service-examples
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: nginx:stable
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        # Custom index page to identify backend pods
        volumeMounts:
        - name: config-volume
          mountPath: /usr/share/nginx/html
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: config-volume
        configMap:
          name: backend-config
          items:
          - key: index.html
            path: index.html
      - name: nginx-config
        configMap:
          name: backend-config
          items:
          - key: default.conf
            path: default.conf

---
# 3. ConfigMap for backend content
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: service-examples
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <body>
      <h1>Backend Service</h1>
      <p>This is a backend pod responding to your request.</p>
      <p>Pod name will be shown by Nginx when properly configured</p>
    </body>
    </html>
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        
        location / {
            root /usr/share/nginx/html;
            index index.html;
            sub_filter 'Pod name will be shown by Nginx when properly configured' 'Hostname: $hostname';
            sub_filter_once off;
        }
    }

---
# 4. ClusterIP Service (Default)
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: service-examples
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 80

---
# 5. NodePort Service (to access from host machine)
apiVersion: v1
kind: Service
metadata:
  name: nodeport-service
  namespace: service-examples
spec:
  type: NodePort
  selector:
    app: backend
  ports:
  - port: 80          # Port exposed inside the cluster
    targetPort: 80    # Port on the pod
    nodePort: 30080   # Port exposed on the node (30000-32767)

---
# 6. Headless Service (for StatefulSets)
apiVersion: v1
kind: Service
metadata:
  name: headless-service
  namespace: service-examples
spec:
  clusterIP: None     # Headless service doesn't get a ClusterIP
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 80

---
# 7. Test commands for services
# Check services: kubectl get svc -n service-examples
# Access NodePort from host: curl localhost:30080 (if port is forwarded)
# Test ClusterIP from another pod: kubectl exec -it deploy/backend-deployment -n service-examples -- curl -s backend-service
# Or create a temporary test pod: kubectl run -n service-examples test-client --image=curlimages/curl --command -- sleep 3600
# Then exec into it: kubectl exec -it test-client -n service-examples -- curl -s backend-service